name: E2E Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  e2e:
    name: 'E2E smoke (${{ matrix.os }})'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type check
        run: npx tsc --noEmit

      - name: Build app
        run: yarn build

      - name: Check preload bundle sizes
        run: node scripts/check-bundle-size.js

      # --with-deps installs Linux apt packages; macOS/Windows handle deps natively
      - name: Install Playwright Chromium (Linux)
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright Chromium (macOS/Windows)
        if: runner.os != 'Linux'
        run: npx playwright install chromium

      # xvfb-maybe auto-detects headless Linux and wraps with xvfb-run; passes through on macOS/Windows
      - name: Run E2E tests
        run: yarn test:e2e
        env:
          CI: true

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-${{ matrix.os }}
          path: test-results/
          retention-days: 7
